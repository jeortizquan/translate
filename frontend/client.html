<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07080d">
<title>Live Translate — Listen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07080d;--surface:#0e1018;--border:#1a1d27;
    --accent:#5e8bff;--accent2:#ff6b9d;--green:#4ecca3;
    --text:#e8eaf0;--muted:#555d78;--card:#11141c;
    --r:16px;
    --serif:'DM Serif Display',Georgia,serif;
    --sans:'DM Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:
    radial-gradient(ellipse at 50% 0%,rgba(94,139,255,.08),transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(78,204,163,.05),transparent 50%);
    pointer-events:none;z-index:0}

  /* ── Lang picker ── */
  #langScreen{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;align-items:center;padding:40px 20px 30px;gap:26px;overflow-y:auto}
  #langScreen h1{font-family:var(--serif);font-size:30px;font-weight:400;text-align:center;line-height:1.1}
  #langScreen h1 em{font-style:italic;color:var(--accent)}
  #langScreen .sub{font-size:13px;color:var(--muted);text-align:center;max-width:270px}
  .lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px}
  .lang-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:18px 12px;text-align:center;cursor:pointer;transition:border-color .2s,transform .15s,background .2s;user-select:none}
  .lang-card:active{transform:scale(.96)}
  .lang-card.selected{border-color:var(--accent);background:rgba(94,139,255,.07)}
  .lang-card .flag{font-size:30px;line-height:1}
  .lang-card .name{font-size:12px;font-weight:600;margin-top:7px}
  .lang-card .code{font-size:10px;color:var(--muted);margin-top:2px}
  .btn-connect{background:var(--accent);color:#fff;border:none;border-radius:100px;padding:15px 36px;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;width:100%;max-width:360px;transition:transform .1s}
  .btn-connect:disabled{opacity:.3;cursor:not-allowed}
  .btn-connect:active{transform:scale(.98)}

  /* ── Listen screen ── */
  #listenScreen{display:none;flex-direction:column;min-height:100dvh;position:relative;z-index:1}
  .topbar{display:flex;align-items:center;padding:14px 18px;gap:10px;position:sticky;top:0;background:rgba(7,8,13,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:10;border-bottom:1px solid var(--border)}
  .flag-big{font-size:24px;line-height:1}
  .topbar-info{flex:1}
  .lang-name{font-family:var(--serif);font-size:17px;line-height:1}
  .conn-row{font-size:10px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
  .dot.live{background:var(--green)}.dot.err{background:var(--accent2)}
  .btn-switch{background:transparent;border:1px solid var(--border);border-radius:100px;color:var(--muted);padding:5px 12px;font-size:11px;font-family:var(--sans);cursor:pointer}

  .content{flex:1;display:flex;flex-direction:column;gap:14px;padding:18px 14px;max-width:620px;margin:0 auto;width:100%}

  .t-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;min-height:110px;position:relative;overflow:hidden;transition:border-color .3s}
  .t-card.speaking{border-color:rgba(94,139,255,.5)}
  .t-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(94,139,255,.03),transparent);pointer-events:none}
  .card-tag{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:5px}
  .card-tag .pip{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .card-tag .pip.g{background:var(--green)}
  .translation-text{font-family:var(--serif);font-size:22px;line-height:1.45;color:var(--text);min-height:55px;word-break:break-word}
  .original-text{font-size:13px;color:var(--muted);line-height:1.5;font-style:italic;min-height:22px}

  .wave-bars{display:flex;align-items:center;gap:3px;height:18px;margin-top:10px;opacity:0;transition:opacity .3s}
  .wave-bars.on{opacity:1}
  .wave-bar{width:3px;background:var(--accent);border-radius:2px;animation:wave 1.2s ease-in-out infinite;opacity:.7}
  .wave-bar:nth-child(2){animation-delay:.1s}.wave-bar:nth-child(3){animation-delay:.2s}
  .wave-bar:nth-child(4){animation-delay:.3s}.wave-bar:nth-child(5){animation-delay:.4s}
  @keyframes wave{0%,100%{height:4px}50%{height:16px}}

  /* ── Audio unlock button ── */
  .audio-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px}
  .audio-bar .ico{font-size:20px}
  .audio-bar .info{flex:1}
  .audio-bar .label{font-size:13px;font-weight:600}
  .audio-bar .hint{font-size:11px;color:var(--muted);margin-top:2px}
  .btn-audio{border:none;border-radius:100px;padding:10px 22px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:background .2s,color .2s;white-space:nowrap}
  .btn-audio.off{background:var(--accent);color:#fff}
  .btn-audio.on {background:rgba(78,204,163,.15);color:var(--green);border:1px solid rgba(78,204,163,.3)}
  .btn-audio.err{background:rgba(255,75,109,.15);color:var(--accent2);border:1px solid rgba(255,75,109,.3)}

  /* ── Stats bar ── */
  .stats{font-size:10px;font-family:monospace;color:var(--muted);padding:4px 0;display:flex;gap:12px;flex-wrap:wrap}
  .stats span{display:flex;align-items:center;gap:3px}
  .stats .val{color:var(--accent)}
  .stats .val.ok{color:var(--green)}
  .stats .val.bad{color:var(--accent2)}

  /* ── History ── */
  .history-section{flex:1}
  .history-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .history-list{display:flex;flex-direction:column;gap:3px}
  .h-item{padding:8px 10px;background:var(--surface);border-radius:9px;font-size:12px;line-height:1.5;opacity:.85;border-left:2px solid transparent;animation:su .3s ease}
  .h-item.orig{border-left-color:var(--muted);color:var(--muted);font-style:italic}
  @keyframes su{from{opacity:0;transform:translateY(6px)}to{opacity:.85;transform:none}}

  /* ── Wait ── */
  #waitMsg{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:30px 18px;text-align:center;color:var(--muted)}
  .pulse{width:50px;height:50px;border-radius:50%;border:2px solid var(--accent);animation:pulse 2s ease-in-out infinite;opacity:.5}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.2);opacity:.2}}

  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- ── Language picker ── -->
<div id="langScreen">
  <h1>Choose your<br><em>language</em></h1>
  <p class="sub">Select the language for your live translation.</p>
  <div class="lang-grid" id="langGrid"></div>
  <button class="btn-connect" id="connectBtn" disabled onclick="connectToLang()">Connect →</button>
</div>

<!-- ── Listen screen ── -->
<div id="listenScreen">

  <div class="topbar">
    <div class="flag-big" id="flagBig"></div>
    <div class="topbar-info">
      <div class="lang-name" id="langName"></div>
      <div class="conn-row">
        <div class="dot" id="connDot"></div>
        <span id="connLabel">Connecting…</span>
      </div>
    </div>
    <button class="btn-switch" onclick="switchLang()">Switch</button>
  </div>

  <div class="content">

    <!-- Translation card -->
    <div class="t-card" id="tCard">
      <div class="card-tag"><span class="pip"></span>Translation</div>
      <div id="waitMsg"><div class="pulse"></div><p style="font-size:13px">Waiting for broadcast…</p></div>
      <div class="translation-text" id="tText" style="display:none"></div>
      <div class="wave-bars" id="waveBars">
        <div class="wave-bar" style="height:8px"></div>
        <div class="wave-bar" style="height:14px"></div>
        <div class="wave-bar" style="height:6px"></div>
        <div class="wave-bar" style="height:12px"></div>
        <div class="wave-bar" style="height:5px"></div>
      </div>
    </div>

    <!-- Original card -->
    <div class="t-card">
      <div class="card-tag"><span class="pip g"></span>Original</div>
      <div class="original-text" id="origText">Original speech will appear here…</div>
    </div>

    <!-- Audio unlock -->
    <div class="audio-bar">
      <div class="ico" id="audioIco">🔇</div>
      <div class="info">
        <div class="label">Audio Translation</div>
        <div class="hint" id="audioHint">Tap Enable — browser requires a tap to allow audio</div>
      </div>
      <button class="btn-audio off" id="audioBtn" onclick="enableAudio()">Enable</button>
    </div>

    <!-- Live stats -->
    <div class="stats" id="statsBar" style="display:none">
      <span>Received <span class="val" id="sRx">0</span></span>
      <span>Played <span class="val ok" id="sPl">0</span></span>
      <span>Errors <span class="val bad" id="sErr">0</span></span>
      <span>Queue <span class="val" id="sQ">0</span></span>
    </div>

    <!-- History -->
    <div class="history-section">
      <div class="history-label">Recent</div>
      <div class="history-list" id="histList"></div>
    </div>

  </div>
</div>

<script>
// ─── Language definitions ──────────────────────────────────────────────────
const LANGS = {
  en:{name:'English',    flag:'🇬🇧'},
  nl:{name:'Dutch',      flag:'🇳🇱'},
  es:{name:'Spanish',    flag:'🇪🇸'},
  pt:{name:'Portuguese', flag:'🇵🇹'},
  fr:{name:'French',     flag:'🇫🇷'},
  de:{name:'German',     flag:'🇩🇪'},
  it:{name:'Italian',    flag:'🇮🇹'},
  uk:{name:'Ukrainian',  flag:'🇺🇦'},
};

// ─── State ────────────────────────────────────────────────────────────────
let selectedLang  = localStorage.getItem('lastLang') || null;
let currentLang   = null;
let ws            = null;
let reconnTmr     = null;
let pingTmr       = null;

// Audio
let audioUnlocked  = false;   // true after user taps Enable
let audioQueue     = [];      // pending ArrayBuffers
let isPlaying      = false;
let nRx = 0, nPl = 0, nErr = 0;
const PRE_BUFFER   = 2;       // start playing only after N chunks are ready
                               // absorbs jitter from variable TTS synthesis time

// ─── Boot ─────────────────────────────────────────────────────────────────
window.onload = () => {
  buildPicker();
  if (selectedLang && LANGS[selectedLang]) {
    document.querySelector(`[data-code="${selectedLang}"]`)?.classList.add('selected');
    document.getElementById('connectBtn').disabled = false;
  }
};

// ─── Lang picker ──────────────────────────────────────────────────────────
function buildPicker() {
  const g = document.getElementById('langGrid');
  for (const [code, info] of Object.entries(LANGS)) {
    const d = document.createElement('div');
    d.className = 'lang-card';
    d.dataset.code = code;
    d.innerHTML = `<div class="flag">${info.flag}</div><div class="name">${info.name}</div><div class="code">${code.toUpperCase()}</div>`;
    d.onclick = () => pick(code);
    g.appendChild(d);
  }
}

function pick(code) {
  selectedLang = code;
  document.querySelectorAll('.lang-card').forEach(c => c.classList.toggle('selected', c.dataset.code === code));
  document.getElementById('connectBtn').disabled = false;
  localStorage.setItem('lastLang', code);
}

function connectToLang() {
  if (!selectedLang) return;
  document.getElementById('langScreen').style.display = 'none';
  document.getElementById('listenScreen').style.display = 'flex';
  document.getElementById('flagBig').textContent = LANGS[selectedLang].flag;
  document.getElementById('langName').textContent = LANGS[selectedLang].name;
  currentLang = selectedLang;
  openWS(currentLang);
}

function switchLang() {
  ws?.close(); ws = null;
  clearInterval(pingTmr); clearTimeout(reconnTmr);
  currentLang = null; audioQueue = [];
  document.getElementById('langScreen').style.display = 'flex';
  document.getElementById('listenScreen').style.display = 'none';
}

// ─── WebSocket ────────────────────────────────────────────────────────────
function openWS(lang) {
  ws?.close();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/listen/${lang}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setConn('live', 'Live');
    clearTimeout(reconnTmr);
    pingTmr = setInterval(() => ws?.readyState === 1 && ws.send('ping'), 20000);
  };

  ws.onmessage = e => {
    if (e.data instanceof ArrayBuffer) onAudioChunk(e.data);
    else { try { onTextMsg(JSON.parse(e.data)); } catch(_){} }
  };

  ws.onclose = () => {
    setConn('err', 'Reconnecting…');
    clearInterval(pingTmr);
    reconnTmr = setTimeout(() => currentLang && openWS(currentLang), 3000);
  };

  ws.onerror = () => setConn('err', 'Error');
}

// ─── Text messages ────────────────────────────────────────────────────────
function onTextMsg(m) {
  if (m.type === 'subtitle')   { showSub(m.text); if (m.original) showOrig(m.original); }
  if (m.type === 'transcript') { showOrig(m.text); }
}

function showSub(text) {
  document.getElementById('waitMsg').style.display = 'none';
  const el = document.getElementById('tText');
  el.style.display = 'block';
  el.textContent = text;
  document.getElementById('waveBars').classList.add('on');
  document.getElementById('tCard').classList.add('speaking');
  addHist(text, false);
  clearTimeout(el._t);
  el._t = setTimeout(() => {
    document.getElementById('waveBars').classList.remove('on');
    document.getElementById('tCard').classList.remove('speaking');
  }, 4000);
}

function showOrig(text) {
  const el = document.getElementById('origText');
  el.textContent = text;
  el.style.color = ''; el.style.fontStyle = '';
  addHist(text, true);
}

function addHist(text, orig) {
  const l = document.getElementById('histList');
  const d = document.createElement('div');
  d.className = 'h-item' + (orig ? ' orig' : '');
  d.textContent = text;
  l.insertBefore(d, l.firstChild);
  while (l.children.length > 30) l.removeChild(l.lastChild);
}

// ─── Audio ────────────────────────────────────────────────────────────────
/*
  Strategy: HTML <audio> element + Blob URL
  -----------------------------------------
  This is the most compatible approach across all browsers including
  iOS Safari, Android Chrome, and desktop browsers.

  Web Audio API (AudioContext + decodeAudioData) has many silent failure
  modes on mobile browsers:
    - AudioContext auto-suspends after ~30s of no user interaction
    - iOS requires AudioContext.resume() from EVERY user gesture, not just the first
    - decodeAudioData Promise API is broken on old Safari
    - Callback API of decodeAudioData can still fail silently on some iOS versions

  HTML <audio> + Blob URL avoids all of these:
    - The browser's native media pipeline handles decoding
    - A single user gesture (the Enable tap) unlocks all subsequent audio
    - Works identically on iPhone, Android, desktop
    - Sequential playback is easy: wait for 'ended' event then play next
*/

function onAudioChunk(buf) {
  nRx++;
  audioQueue.push(buf);
  updateStats();

  if (!audioUnlocked) {
    // Flash the Enable button to remind user
    const btn = document.getElementById('audioBtn');
    btn.style.transform = 'scale(1.05)';
    setTimeout(() => btn.style.transform = '', 200);
    return;
  }
  drainQueue();
}

// Called from Enable button — MUST be a direct user gesture handler
async function enableAudio() {
  const btn  = document.getElementById('audioBtn');
  const ico  = document.getElementById('audioIco');
  const hint = document.getElementById('audioHint');

  if (audioUnlocked) {
    // Toggle off
    audioUnlocked = false;
    audioQueue = [];
    btn.textContent = 'Enable';
    btn.className = 'btn-audio off';
    ico.textContent = '🔇';
    hint.textContent = 'Audio paused — tap Enable to resume';
    return;
  }

  // ── Unlock audio with a silent probe ──────────────────────────────────
  // Play a tiny silent WAV to verify the browser will let us play audio.
  // This MUST happen synchronously in the click handler.
  try {
    await playProbe();
  } catch(e) {
    btn.className = 'btn-audio err';
    btn.textContent = 'Error';
    hint.textContent = `Could not unlock audio: ${e.message}`;
    console.error('Audio probe failed:', e);
    return;
  }

  audioUnlocked = true;
  btn.textContent = 'Mute';
  btn.className = 'btn-audio on';
  ico.textContent = '🔊';
  hint.textContent = 'Audio enabled — listening live';
  document.getElementById('statsBar').style.display = 'flex';

  // Drain anything that queued up before the user tapped
  drainQueue();
}

// Play a 0.1-second silent WAV to unlock the audio pipeline
function playProbe() {
  return new Promise((resolve, reject) => {
    // Minimal valid WAV: 44-byte header + 0 frames → 0.1s silence at 22050 Hz
    const sr = 22050, dur = 0.1, samples = Math.floor(sr * dur);
    const buf = new ArrayBuffer(44 + samples * 2);
    const view = new DataView(buf);
    const write = (o, s) => { for(let i=0;i<s.length;i++) view.setUint8(o+i, s.charCodeAt(i)); };
    write(0,'RIFF'); view.setUint32(4, 36 + samples*2, true);
    write(8,'WAVE'); write(12,'fmt '); view.setUint32(16,16,true);
    view.setUint16(20,1,true); view.setUint16(22,1,true);
    view.setUint32(24,sr,true); view.setUint32(28,sr*2,true);
    view.setUint16(32,2,true); view.setUint16(34,16,true);
    write(36,'data'); view.setUint32(40,samples*2,true);
    // samples stay zero (silence)

    const blob = new Blob([buf], {type:'audio/wav'});
    const url  = URL.createObjectURL(blob);
    const a    = new Audio(url);
    a.onended  = () => { URL.revokeObjectURL(url); resolve(); };
    a.onerror  = (e) => { URL.revokeObjectURL(url); reject(new Error('Probe playback failed')); };
    a.play().catch(err => { URL.revokeObjectURL(url); reject(err); });
  });
}

async function drainQueue() {
  if (isPlaying || !audioUnlocked) return;
  // Pre-buffer: wait until we have at least PRE_BUFFER chunks ready
  // This smooths over variable TTS synthesis latency
  if (audioQueue.length < PRE_BUFFER && audioQueue.length > 0) {
    // We have some chunks but not enough — wait briefly for more
    setTimeout(() => { if (!isPlaying) drainQueue(); }, 300);
    return;
  }
  if (audioQueue.length === 0) return;

  isPlaying = true;

  while (audioQueue.length > 0 && audioUnlocked) {
    updateStats();
    const buf = audioQueue.shift();
    try {
      await playWav(buf);
      nPl++;
    } catch(e) {
      nErr++;
      console.error('playWav error:', e);
    }
    updateStats();
  }

  isPlaying = false;
  updateStats();
}

function playWav(arrayBuffer) {
  return new Promise((resolve, reject) => {
    const blob = new Blob([arrayBuffer], {type: 'audio/wav'});
    const url  = URL.createObjectURL(blob);
    const a    = new Audio(url);

    const cleanup = () => URL.revokeObjectURL(url);

    a.onended = () => { cleanup(); resolve(); };
    a.onerror = (e) => {
      cleanup();
      const msg = a.error ? `MediaError code ${a.error.code}` : String(e);
      reject(new Error(msg));
    };

    a.play().catch(err => { cleanup(); reject(err); });
  });
}

// ─── Stats ────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('sRx').textContent  = nRx;
  document.getElementById('sPl').textContent  = nPl;
  document.getElementById('sErr').textContent = nErr;
  document.getElementById('sQ').textContent   = audioQueue.length;
}

// ─── UI helpers ───────────────────────────────────────────────────────────
function setConn(cls, label) {
  document.getElementById('connDot').className  = 'dot ' + cls;
  document.getElementById('connLabel').textContent = label;
}
</script>
</body>
</html>
